<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Site officiel de Mandresy. Informations de vérification AdMob et lien vers mon portfolio.">
  <title>Mandresy - Site officiel</title>

  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--dark);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      z-index: 10;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      background: linear-gradient(to right, var(--primary-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.7;
      color: #94a3b8;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .verification-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .verification-badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 10px #22c55e;
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .btn:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #475569;
    }

    /* Decorative blobs */
    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.2;
    }

    .blob-1 {
      top: 10%;
      left: 10%;
      animation: float 10s infinite alternate;
    }

    .blob-2 {
      bottom: 10%;
      right: 10%;
      animation: float 15s infinite alternate-reverse;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(30px, 30px) scale(1.1);
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 2rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <main class="card">
      <div class="verification-badge">AdMob Vérifié</div>
      <h1>Bienvenue</h1>
      <p>
        Ce domaine est le portail officiel de Mandresy.<br>
        Il héberge le fichier <code
          style="color: #cbd5e1; background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 4px;">app-ads.txt</code>
        pour la conformité publicitaire mobile.
      </p>

      <a href="https://mandreshope.github.io/portfolio/" class="btn" id="portfolio-link">
        Découvrir mon Portfolio
      </a>
    </main>

    <footer style="text-align: center;">
      <p style="margin-bottom: 0;">&copy; 2024 Mandresy. Tous droits réservés.</p>
    </footer>
  </div>
</body>

</html>
